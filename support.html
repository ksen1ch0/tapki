<!-- ПОДДЕРЖКА -->

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Поддержка</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:#9d9d9d;
}

.container{
width:93%;
margin:40px auto;
}

.title{
font-size:58px;
font-weight:800;
margin-bottom:30px;
}

.support{
background:#f5f5f5;
border-radius:30px;
padding:40px;
box-shadow:0 10px 24px rgba(0,0,0,0.12);
}

.support h2{
font-size:36px;
margin-bottom:20px;
}

.support p{
font-size:20px;
line-height:1.7;
color:#555;
margin-bottom:30px;
}

textarea{
width:100%;
height:220px;
border:none;
border-radius:20px;
padding:24px;
font-size:18px;
resize:none;
background:#e7e7e7;
margin-bottom:24px;
}

button{
width:240px;
height:58px;
border:none;
border-radius:18px;
background:linear-gradient(135deg,#111,#2c2c2c);
color:white;
font-size:17px;
font-weight:700;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h1 class="title">Поддержка</h1>

<div class="support">

<h2>Связаться с нами</h2>

<p>
Опишите проблему или задайте вопрос —
мы ответим вам в ближайшее время.
</p>

<textarea placeholder="Введите сообщение..."></textarea>

<button>Отправить</button>

</div>

</div>

</body>
</html>
