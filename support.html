<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Поддержка</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Montserrat',sans-serif;
  background:#9d9d9d;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  overflow-x:hidden;
}

/* HEADER */

header{
  width:100%;
  height:82px;
  background:#f8f8f8;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 35px;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.logo-wrapper{
  display:flex;
  align-items:center;
  gap:16px;
}

.logo-circle{
  width:58px;
  height:58px;
  border-radius:50%;
  overflow:hidden;
  background:white;
}

.logo-circle img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.logo-wrapper h1{
  font-size:22px;
  font-weight:800;
}

nav{
  display:flex;
  gap:36px;
}

nav a{
  text-decoration:none;
  color:#111;
  font-weight:500;
}

/* CONTENT */

.container{
  width:93%;
  margin:40px auto;
  flex:1;
}

.title{
  font-size:72px;
  font-weight:800;
  margin-bottom:35px;
}

.support{
  width:100%;
  background:#f5f5f5;
  border-radius:30px;
  padding:50px;
  box-shadow:0 10px 24px rgba(0,0,0,.12);
}

.support h2{
  font-size:36px;
  margin-bottom:20px;
}

.support p{
  font-size:20px;
  line-height:1.7;
  color:#555;
  margin-bottom:30px;
}

textarea{
  width:100%;
  height:220px;
  border:none;
  border-radius:20px;
  padding:24px;
  font-size:18px;
  resize:none;
  background:#e7e7e7;
  margin-bottom:24px;
  transition:.3s;
}

textarea:focus{
  outline:none;
  box-shadow:0 0 12px rgba(255,91,46,.2);
  background:white;
}

button{
  width:280px;
  height:64px;
  border:none;
  border-radius:18px;
  background:linear-gradient(135deg,#111,#2c2c2c);
  color:white;
  font-size:18px;
  font-weight:700;
  cursor:pointer;
  transition:.3s;
}

button:hover{
  background:linear-gradient(135deg,#ff5b2e,#ff7b57);
}

/* FOOTER */

footer{
  width:100%;
  background:#f5f5f5;
  padding:32px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:18px;
  box-shadow:0 -3px 10px rgba(0,0,0,.08);
  margin-top:auto;
}

footer div{
  flex:1;
  text-align:center;
  font-weight:500;
}

@media(max-width:850px){
  nav{display:none;}
  footer{flex-direction:column;gap:15px;}
  .title{font-size:48px;}
}
</style>
</head>
<body>

<header>
<div class="logo-wrapper">
  <div class="logo-circle"><img src="logo.png"></div>
  <h1>НА ПОДЪЕМЕ</h1>
</div>
<nav>
  <a href="index.html">Главная</a>
  <a href="katalog.html">Каталог</a>
  <a href="onas.html">О нас</a>
  <a href="kab.html">Личный кабинет</a>
  <a href="korzina.html">Корзина</a>
</nav>
</header>

<div class="container">
<h1 class="title">Поддержка</h1>

<div class="support">
<h2>Связаться с нами</h2>
<p>Опишите проблему или задайте вопрос — мы ответим вам в ближайшее время.</p>

<textarea id="supportMessage" placeholder="Введите сообщение..."></textarea>
<button onclick="sendMessage()">Отправить</button>
</div>
</div>

<footer>
<div>Телефон: +7-900-015-15-15</div>
<div>Почта: krasovka@gmail.com</div>
<div>Адрес: г. Угинск ул. Тамары 23</div>
</footer>

<script>
function sendMessage(){
  const textarea = document.getElementById('supportMessage');
  const message = textarea.value.trim();

  if(message === ''){
    alert('Пожалуйста, введите сообщение.');
    return;
  }

  // Очистка textarea
  textarea.value = '';

  // Показ красивого уведомления
  const thanksDiv = document.createElement('div');
  thanksDiv.textContent = "Спасибо большое за обращение! Мы свяжемся с вами в ближайшее время.";
  thanksDiv.style.background = '#2dbb55';
  thanksDiv.style.color = 'white';
  thanksDiv.style.padding = '18px 25px';
  thanksDiv.style.borderRadius = '16px';
  thanksDiv.style.fontSize = '18px';
  thanksDiv.style.fontWeight = '600';
  thanksDiv.style.marginTop = '20px';
  thanksDiv.style.textAlign = 'center';
  thanksDiv.style.boxShadow = '0 5px 12px rgba(0,0,0,.2)';

  document.querySelector('.support').appendChild(thanksDiv);

  // Автоматически скрыть через 5 секунд
  setTimeout(() => {
    thanksDiv.remove();
  }, 5000);
}
</script>

</body>
</html>
