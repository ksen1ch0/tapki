<body>

<header>

<div class="container">
<h1 class="title">Поддержка</h1>

<div class="support">
<h2>Связаться с нами</h2>
<p>Опишите проблему или задайте вопрос — мы ответим вам в ближайшее время.</p>

<textarea id="supportMessage" placeholder="Введите сообщение..."></textarea>
<button onclick="sendMessage()">Отправить</button>
</div>
<a href="kab.html" class="back-btn">← Назад</a>
</div>

<footer>

<div>
Телефон: <a href="tel:+79000151515" class="contact-link">+7-900-015-15-15</a>
</div>

<div>
Почта: <a href="mailto:krasovka@gmail.com" class="contact-link">krasovka@gmail.com</a>
</div>

<div class="footer-address">
Адрес: г. Угинск ул. Тамары 23
</div>

</footer>

<script>

function isValidMessage(text){
  return text.trim().length > 0;
}

function sendMessage(){
  const textarea = document.getElementById('supportMessage');
  const message = textarea.value.trim();
  const button = document.querySelector('.support button');
  

  textarea.classList.remove('error');
  const oldError = document.querySelector('.error-msg');
  if(oldError) oldError.remove();
  

  if(!isValidMessage(message)){
    showError(textarea, 'Пожалуйста, опишите ваш вопрос или проблему');
    return;
  }
  
 
  const originalText = button.textContent;
  button.textContent = 'Отправка...';
  button.disabled = true;
  button.style.opacity = '0.7';
  
  setTimeout(()=>{

    textarea.value = '';
    

    showSuccess(button, ' Сообщение отправлено!');
    

    setTimeout(()=>{
      button.textContent = originalText;
      button.disabled = false;
      button.style.opacity = '1';
    }, 2500);
    
  }, 800); 
}

function showError(input, message){
  input.classList.add('error');
  input.focus();
  
  const errorDiv = document.createElement('div');
  errorDiv.className = 'error-msg';
  errorDiv.textContent = message;

  input.parentNode.insertBefore(errorDiv, input.nextSibling);

  input.addEventListener('input', function clearError(){
    input.classList.remove('error');
    const err = input.parentNode.querySelector('.error-msg');
    if(err) err.remove();
    input.removeEventListener('input', clearError);
  }, {once: true});
}

function showSuccess(btn, message){
  const originalBg = btn.style.background;
  
  btn.textContent = message;
  btn.style.background = 'linear-gradient(135deg, #2dbb55, #3dd166)';
  btn.style.transform = 'scale(1.02)';
  
  setTimeout(()=>{
    btn.style.background = originalBg;
    btn.style.transform = '';
  }, 2500);
}


function updateCartBadge() {
  const cart = JSON.parse(localStorage.getItem('cart') || '[]');
  const totalCount = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
  const badge = document.querySelector('.cart-badge');
  
  if (badge) {
    badge.textContent = totalCount;
    badge.classList.toggle('active', totalCount > 0);
  }
}


document.addEventListener('DOMContentLoaded', updateCartBadge);


window.addEventListener('storage', (e) => {
  if (e.key === 'cart' || !e.key) {
    updateCartBadge();
  }
});



</script>

</body>
</html>
