<!-- МОИ ЗАКАЗЫ -->

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Мои заказы</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:#9d9d9d;
color:#111;
}

.container{
width:93%;
margin:40px auto;
}

.title{
font-size:58px;
font-weight:800;
margin-bottom:30px;
}

.orders{
display:flex;
flex-direction:column;
gap:24px;
}

.order{
background:#f5f5f5;
border-radius:28px;
padding:30px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 10px 25px rgba(0,0,0,0.12);
}

.order-left{
display:flex;
align-items:center;
gap:24px;
}

.order img{
width:140px;
height:110px;
object-fit:contain;
}

.order-info h2{
font-size:30px;
margin-bottom:10px;
}

.order-info p{
font-size:18px;
color:#555;
}

.status{
padding:14px 22px;
border-radius:14px;
font-weight:700;
color:white;
}

.green{background:#2dbb55;}
.orange{background:#ff962f;}
.red{background:#ff4c4c;}

</style>
</head>

<body>

<div class="container">

<h1 class="title">Мои заказы</h1>

<div class="orders">

<div class="order">

<div class="order-left">
<img src="red.png">

<div class="order-info">
<h2>Nike Air Mariah</h2>
<p>Заказ #3000</p>
</div>

</div>

<div class="status green">Получен</div>

</div>

<div class="order">

<div class="order-left">
<img src="black.png">

<div class="order-info">
<h2>Nike Air Mariah</h2>
<p>Заказ #3001</p>
</div>

</div>

<div class="status orange">В пути</div>

</div>

<div class="order">

<div class="order-left">
<img src="blueorange.png">

<div class="order-info">
<h2>Nike Air Mariah</h2>
<p>Заказ #3002</p>
</div>

</div>

<div class="status red">Отменён</div>

</div>

</div>

</div>

</body>
</html>
