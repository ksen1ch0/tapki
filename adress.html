<!-- АДРЕСА -->

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Адреса</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:#9d9d9d;
}

.container{
width:93%;
margin:40px auto;
}

.title{
font-size:58px;
font-weight:800;
margin-bottom:30px;
}

.address{
background:#f5f5f5;
padding:34px;
border-radius:28px;
margin-bottom:24px;
box-shadow:0 10px 24px rgba(0,0,0,0.12);
}

.address h2{
font-size:30px;
margin-bottom:12px;
}

.address p{
font-size:20px;
color:#555;
line-height:1.6;
}

button{
margin-top:18px;
width:220px;
height:54px;
border:none;
border-radius:16px;
background:#111;
color:white;
font-size:16px;
font-weight:700;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h1 class="title">Адреса доставки</h1>

<div class="address">
<p>г. Москва, ул. Комсомольская 5</p>
<button>Редактировать</button>
</div>

<div class="address">
<p>г. Москва, ул. Ленина 15</p>
<button>Редактировать</button>
</div>

</div>

</body>
</html>
