<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Корзина — НА ПОДЪЕМЕ</title>
<link rel="stylesheet" href="korzina.css">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<header>
<div class="logo-wrapper">
  <div class="logo-circle"><a href="index.html"><img src="logo.png" alt="logo"></a></div>
  <h1>НА ПОДЪЕМЕ</h1>
</div>
<nav>
  <a href="index.html">Главная</a>
  <a href="katalog.html">Каталог</a>
  <a href="onas.html">О нас</a>
  <a href="kab.html">Личный кабинет</a>
  <a href="korzina.html" class="nav-cart-link">Корзина <span class="cart-badge">0</span></a>
</nav>
</header>

<div class="wrapper">
  <div class="cart-header">Ваша корзина</div>
  <div class="cart-items" id="cartItems"></div>
  <div class="total-row" id="totalPrice">Итого: 0 ₽</div>
  <button class="checkout-btn">Оформить заказ</button>
</div>

<footer>
  <div>Телефон: <a href="tel:+79000151515" class="contact-link">+7-900-015-15-15</a></div>
  <div>Почта: <a href="mailto:krasovka@gmail.com" class="contact-link">krasovka@gmail.com</a></div>
  <div class="footer-address">Адрес: г. Угинск ул. Тамары 23</div>
</footer>

<script>
let cart = JSON.parse(localStorage.getItem('cart') || '[]');
let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
const cartContainer = document.getElementById('cartItems');
const totalPriceEl = document.getElementById('totalPrice');
const checkoutBtn = document.querySelector('.checkout-btn');

function parsePrice(price) {
    if (typeof price === 'number' && !isNaN(price)) return price;
    if (!price || price === 'не число' || price === 'NaN') return 0;
    
    let cleanPrice = String(price).replace(/[^0-9.,]/g, '');
    cleanPrice = cleanPrice.replace(',', '.');
    
    let numPrice = parseFloat(cleanPrice);
    return isNaN(numPrice) ? 0 : numPrice;
}

function updateCartBadge(){
    const totalCount = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
    const badge = document.querySelector('.cart-badge');
    if(badge){
        badge.textContent = totalCount;
        badge.classList.toggle('active', totalCount > 0);
    }
}

function renderCart(){
    cartContainer.innerHTML = '';
    let total = 0;

    if(cart.length === 0){
        cartContainer.innerHTML = '<h2 style="text-align:center;color:#666;">Корзина пуста</h2>';
        totalPriceEl.innerText = 'Итого: 0 ₽';
        updateCartBadge();
        return;
    }

    cart.forEach((item, index)=>{
        const price = parsePrice(item.price);
        const itemTotal = price * (item.quantity || 1);
        total += itemTotal;

        const itemDiv = document.createElement('div');
        itemDiv.classList.add('cart-item');

        itemDiv.innerHTML = `
            <img src="${item.image}" alt="${item.name}">
            <div class="cart-item-details">
                <h3>${item.name}</h3>
                <div class="price">${price.toLocaleString()} ₽</div>
                <div><strong>Размер:</strong> ${item.size || 'Не указан'}</div>
                <div class="quantity">
                    <button class="decrease" data-index="${index}">−</button>
                    <span class="qty-val">${item.quantity || 1}</span>
                    <button class="increase" data-index="${index}">+</button>
                    <button class="remove-btn" data-index="${index}">Удалить</button>
                </div>
            </div>
            <div class="item-total-side">
                <div class="item-total-label">Сумма:</div>
                <div class="item-total-value">${itemTotal.toLocaleString()} ₽</div>
            </div>
        `;
        cartContainer.appendChild(itemDiv);
    });

    totalPriceEl.innerText = 'Итого: ' + total.toLocaleString() + ' ₽';
    updateCartBadge();
    attachCartEvents();
}

function attachCartEvents(){
    document.querySelectorAll('.decrease').forEach(btn=>{
        btn.addEventListener('click', function(){
            const idx = parseInt(this.dataset.index);
            if(cart[idx].quantity <= 1){
                cart.splice(idx, 1);
            } else {
                cart[idx].quantity--;
            }
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
        });
    });

    document.querySelectorAll('.increase').forEach(btn=>{
        btn.addEventListener('click', function(){
            const idx = parseInt(this.dataset.index);
            cart[idx].quantity = (cart[idx].quantity || 1) + 1;
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
        });
    });

    document.querySelectorAll('.remove-btn').forEach(btn=>{
        btn.addEventListener('click', function(){
            const idx = parseInt(this.dataset.index);
            cart.splice(idx, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
        });
    });
}

checkoutBtn.addEventListener('click', () => {
    if(cart.length === 0){
        alert('Корзина пуста!');
        return;
    }

    let orders = JSON.parse(localStorage.getItem('orders') || '[]');

    const orderItems = cart.map(item => ({
        name: item.name,
        image: item.image,
        size: item.size,
        price: parsePrice(item.price),
        quantity: item.quantity || 1
    }));

    const totalAmount = orderItems.reduce((sum, item) => 
        sum + (item.price * item.quantity), 0
    );

    orders.push({
        id: orders.length,
        items: orderItems,
        totalAmount: totalAmount,
        status: 'Оформлен',
        date: new Date().toLocaleString('ru-RU')
    });

    cart.forEach(item => {
        favorites = favorites.filter(f => !(f.name === item.name && f.size === item.size));
    });

    localStorage.setItem('favorites', JSON.stringify(favorites));
    localStorage.setItem('orders', JSON.stringify(orders));

    let bonuses = Number(localStorage.getItem('bonuses') || 0);
    bonuses += 500;
    localStorage.setItem('bonuses', bonuses);

    localStorage.removeItem('cart');
    cart = [];
    renderCart();
    alert('Заказ оформлен! +500 бонусов');
    // ✅ Убран редирект в личный кабинет
});

renderCart();
</script>

</body>
</html>
