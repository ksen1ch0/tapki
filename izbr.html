<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Избранное — НА ПОДЪЕМЕ</title>
<link rel="stylesheet" href="izbr.css">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<header>
<div class="logo-wrapper"><div class="logo-circle"><a href="index.html"><img src="logo.png" alt="logo"></a></div>
<h1>НА ПОДЪЕМЕ</h1></div>
<nav>
  <a href="index.html">Главная</a>
  <a href="katalog.html">Каталог</a>
  <a href="onas.html">О нас</a>
  <a href="kab.html">Личный кабинет</a>
  <a href="korzina.html" class="nav-cart-link">Корзина <span class="cart-badge">0</span></a>
</nav>
</header>
<div class="container">
<h1 class="title">Избранное</h1>
<div class="products" id="favoritesContainer"></div>
</div>
<!-- Модальное окно выбора размера -->
 <a href="kab.html" class="back-btn">← Назад</a>
<div id="sizeModal">
  <div id="sizeModalContent">
    <h3>Выберите размер</h3>
    <div id="sizeOptions"></div>
    <button id="sizeCancel">Отмена</button>
  </div>
</div>
<footer>

<div>
Телефон: <a href="tel:+79000151515" class="contact-link">+7-900-015-15-15</a>
</div>

<div>
Почта: <a href="mailto:krasovka@gmail.com" class="contact-link">krasovka@gmail.com</a>
</div>

<div class="footer-address">
Адрес: г. Угинск ул. Тамары 23
</div>

</footer>

<script>
let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
const container = document.getElementById('favoritesContainer');
const modal = document.getElementById('sizeModal');
const sizeOptions = document.getElementById('sizeOptions');
const sizeCancel = document.getElementById('sizeCancel');

sizeCancel.onclick = ()=> modal.style.display='none';

function renderFavorites(){
  container.innerHTML='';
  if(favorites.length===0){
    container.innerHTML='<h2 style="grid-column:1/-1;text-align:center;font-size:32px;margin-top:50px;">В избранном пока ничего нет</h2>';
    return;
  }

  favorites.forEach((item,index)=>{
    const card = document.createElement('div');
    card.classList.add('card');
    card.innerHTML = `
      <div class="remove-fav">❤</div>
      <img src="${item.image}" alt="${item.name}">
      <h2>${item.name}</h2>
      <div class="price">${item.price.toLocaleString()} ₽</div>
      <button class="buy-btn">Купить</button>
    `;

    // Удаление из избранного
    card.querySelector('.remove-fav').addEventListener('click',()=>{
      favorites.splice(index,1);
      localStorage.setItem('favorites',JSON.stringify(favorites));
      renderFavorites();
    });

    // Кнопка "Купить" с выбором размера и удалением из избранного
    card.querySelector('.buy-btn').addEventListener('click',()=>{
      const sizes = item.sizes || [38,39,40,41,42];
      sizeOptions.innerHTML='';
      sizes.forEach(size=>{
        const btn=document.createElement('button');
        btn.className='size-btn';
        btn.textContent=size;
        btn.onclick=()=>{
          let cart=JSON.parse(localStorage.getItem('cart')||'[]');
          const existing=cart.find(i=>i.name===item.name && i.size===size);
          if(existing){ existing.quantity++; } else {
            cart.push({name:item.name,size:size,quantity:1,price:item.price,image:item.image});
          }
          localStorage.setItem('cart',JSON.stringify(cart));
          updateCartBadge();

          // Удаляем товар из избранного после добавления в корзину
          favorites.splice(index,1);
          localStorage.setItem('favorites',JSON.stringify(favorites));

          modal.style.display='none';
          renderFavorites();
          alert('Товар добавлен в корзину и удален из избранного');
        };
        sizeOptions.appendChild(btn);
      });
      modal.style.display='flex';
    });

    container.appendChild(card);
  });
}

renderFavorites();
function updateCartBadge() {
  const cart = JSON.parse(localStorage.getItem('cart') || '[]');
  const totalCount = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
  const badge = document.querySelector('.cart-badge');
  
  if (badge) {
    badge.textContent = totalCount;
    badge.classList.toggle('active', totalCount > 0);
  }
}


updateCartBadge();


window.addEventListener('storage', (e) => {
  if (e.key === 'cart' || !e.key) {
    updateCartBadge();
  }
});
</script>

</body>
</html>
