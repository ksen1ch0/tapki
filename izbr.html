<!-- ИЗБРАННОЕ -->

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Избранное</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:#9d9d9d;
}

.container{
width:93%;
margin:40px auto;
}

.title{
font-size:58px;
font-weight:800;
margin-bottom:30px;
}

.products{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:28px;
}

.card{
background:#f5f5f5;
border-radius:28px;
padding:30px;
text-align:center;
box-shadow:0 10px 24px rgba(0,0,0,0.12);
transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:220px;
height:160px;
object-fit:contain;
margin-bottom:20px;
}

.card h2{
font-size:28px;
margin-bottom:14px;
}

.price{
font-size:24px;
font-weight:700;
margin-bottom:20px;
}

button{
width:180px;
height:50px;
border:none;
border-radius:16px;
background:linear-gradient(135deg,#111,#2c2c2c);
color:white;
font-size:16px;
font-weight:700;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:linear-gradient(135deg,#ff5b2e,#ff7b57);
transform:scale(1.03);
}

@media(max-width:1200px){
.products{
grid-template-columns:repeat(2,1fr);
}
}

@media(max-width:700px){
.products{
grid-template-columns:1fr;
}
}

</style>
</head>

<body>

<div class="container">

<h1 class="title">Избранное</h1>

<div class="products">

<div class="card">
<img src="red.png">
<h2>Nike Air Mariah</h2>
<div class="price">33 999 ₽</div>
<button>Купить</button>
</div>

<div class="card">
<img src="black.png">
<h2>Nike Air Mariah</h2>
<div class="price">42 999 ₽</div>
<button>Купить</button>
</div>

<div class="card">
<img src="blueorange.png">
<h2>Nike Air Mariah</h2>
<div class="price">24 999 ₽</div>
<button>Купить</button>
</div>

<div class="card">
<img src="green.png">
<h2>Nike Air Mariah</h2>
<div class="price">29 999 ₽</div>
<button>Купить</button>
</div>

<div class="card">
<img src="pink.png">
<h2>Nike Air Mariah</h2>
<div class="price">31 499 ₽</div>
<button>Купить</button>
</div>

<div class="card">
<img src="pinkwhite.png">
<h2>Nike Air Mariah</h2>
<div class="price">38 999 ₽</div>
<button>Купить</button>
</div>

<div class="card">
<img src="gray.png">
<h2>Nike Air Mariah</h2>
<div class="price">27 999 ₽</div>
<button>Купить</button>
</div>

<div class="card">
<img src="pinkwhite.png">
<h2>Nike Air Mariah</h2>
<div class="price">35 999 ₽</div>
<button>Купить</button>
</div>

</div>

</div>

</body>
</html>
