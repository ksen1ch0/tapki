<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Личный кабинет — НА ПОДЪЕМЕ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" type="text/css" href="kab.css">
</head>
<body>

<header>
  <div class="logo-wrapper">
    <div class="logo-circle"><a href="index.html"><img src="logo.png" alt="logo"></a></div>
    <h1>НА ПОДЪЕМЕ</h1>
  </div>
  <nav>
    <a href="index.html">Главная</a>
    <a href="katalog.html">Каталог</a>
    <a href="onas.html">О нас</a>
    <a href="kab.html">Личный кабинет</a>
    <a href="korzina.html" class="nav-cart-link">Корзина <span class="cart-badge">0</span></a>
  </nav>
</header>

<div class="wrapper">
  <h1 class="page-title">Личный кабинет</h1>

  <div class="top-section">
    
    <div class="profile-card" onclick="window.location.href='nastrojki.html'" style="cursor:pointer;">
      <div class="avatar">А</div>
      <div class="profile-info">
        <h2 id="userFullName">Пользователь</h2>
        <p id="userEmail"></p>
        <p>Участник программы бонусов</p>
      </div>
    </div>

    <div class="stats">
      <div class="stat-card">
        <a href="zakazi.html">
          <h3>Заказы</h3>
          <span id="ordersCount">0</span>
        </a>
      </div>
      <div class="stat-card">
        <a href="izbr.html">
          <h3>Избранное</h3>
          <span id="favoritesCount">0</span>
        </a>
      </div>
      <div class="stat-card">
        <a href="bonusy.html">
          <h3>Бонусы</h3>
          <span id="bonusCount">0</span>
        </a>
      </div>
    </div>

  </div>  

  <div class="orders">
    <h2>Последние заказы</h2>
    <div id="ordersContainer"></div>
  </div>

  <div class="support">
    <h2>Нужна помощь?</h2>
    <a href="support.html"><button>Связаться с поддержкой</button></a>
  </div>
</div>

<footer>
  <div>Телефон: <a href="tel:+79000151515" class="contact-link">+7-900-015-15-15</a></div>
  <div>Почта: <a href="mailto:krasovka@gmail.com" class="contact-link">krasovka@gmail.com</a></div>
  <div class="footer-address">Адрес: г. Угинск ул. Тамары 23</div>
</footer>

<script>
function updateBonuses(){
  const bonuses = Number(localStorage.getItem('bonuses') || 0);
  document.getElementById('bonusCount').textContent = bonuses;
}

function renderOrders() {
  const orders = JSON.parse(localStorage.getItem('orders') || '[]');
  const container = document.getElementById('ordersContainer');
  container.innerHTML = '';

  if(orders.length === 0){
    container.innerHTML = '<h3 style="text-align:center;">У вас пока нет заказов</h3>';
    document.getElementById('ordersCount').textContent = 0;
    return;
  }

  orders.forEach((order,index)=>{
    const orderDiv = document.createElement('div');
    orderDiv.classList.add('order');

    let statusClass = '';
    switch(order.status){
      case 'Оформлен': statusClass = 'done'; break;
      case 'В пути': statusClass = 'delivery'; break;
      case 'Отменён': statusClass = 'cancel'; break;
      case 'Доставлен': statusClass = 'done'; break;
      default: statusClass = 'done';
    }

    orderDiv.innerHTML = `
      <span>Заказ #${1000 + index} — ${order.name}</span>
      <div class="status ${statusClass}">${order.status}</div>
    `;
    container.appendChild(orderDiv);
  });

  document.getElementById('ordersCount').textContent = orders.length;
}

function updateFavoritesCount(){
  const favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
  document.getElementById('favoritesCount').textContent = favorites.length;
}

function loadUser(){
  const user = JSON.parse(localStorage.getItem('user') || '{}');
  const fullName = `${user.firstName || ''} ${user.lastName || ''}`.trim();
  document.getElementById('userFullName').textContent = fullName || 'Пользователь';
  
  const userEmailEl = document.getElementById('userEmail');
  if(user.email && user.email.trim() !== ''){
    userEmailEl.textContent = user.email;
    userEmailEl.style.display = 'block';
  } else {
    userEmailEl.style.display = 'none';
  }
  
  const avatar = document.querySelector('.avatar');
  avatar.textContent = user.firstName ? user.firstName[0].toUpperCase() : 'П';
}


loadUser();
updateBonuses();
updateFavoritesCount();
renderOrders();


window.addEventListener('storage', loadUser);
window.addEventListener('storage', updateBonuses);
window.addEventListener('storage', updateFavoritesCount);
window.addEventListener('storage', renderOrders);
// Обновление счётчика корзины в шапке
function updateCartBadge() {
  const cart = JSON.parse(localStorage.getItem('cart') || '[]');
  const totalCount = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
  const badge = document.querySelector('.cart-badge');
  
  if (badge) {
    badge.textContent = totalCount;
    badge.classList.toggle('active', totalCount > 0);
  }
}


updateCartBadge();


window.addEventListener('storage', (e) => {
  if (e.key === 'cart' || !e.key) {
    updateCartBadge();
  }
});

</script>
</body>
</html>
