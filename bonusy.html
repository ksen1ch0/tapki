<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Бонусы</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Montserrat',sans-serif;
background:#9d9d9d;
min-height:100vh;
display:flex;
flex-direction:column;
}

header{
width:100%;
height:82px;
background:#f8f8f8;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 35px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.logo-wrapper{
display:flex;
align-items:center;
gap:16px;
}

.logo-circle{
width:58px;
height:58px;
border-radius:50%;
overflow:hidden;
background:white;
}

.logo-circle img{
width:100%;
height:100%;
object-fit:cover;
}

.logo-wrapper h1{
font-size:22px;
font-weight:800;
}

nav{
display:flex;
gap:36px;
}

nav a{
text-decoration:none;
color:#111;
font-weight:500;
}

.container{
width:93%;
margin:40px auto;
flex:1;
}

.title{
font-size:58px;
font-weight:800;
margin-bottom:30px;
}

.bonus-card{
background:#f5f5f5;
border-radius:30px;
padding:50px;
box-shadow:0 10px 25px rgba(0,0,0,.12);
text-align:center;
}

.bonus-card h2{
font-size:36px;
margin-bottom:20px;
}

.bonus-value{
font-size:90px;
font-weight:800;
color:#ff962f;
margin-bottom:20px;
}

.bonus-card p{
font-size:20px;
color:#555;
}

footer{
width:100%;
background:#f5f5f5;
padding:32px 40px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:18px;
box-shadow:0 -3px 10px rgba(0,0,0,.08);
}

footer div{
flex:1;
text-align:center;
}

</style>
</head>
<body>

<header>

<div class="logo-wrapper">

<div class="logo-circle">
<img src="logo.png">
</div>

<h1>НА ПОДЪЕМЕ</h1>

</div>

<nav>
<a href="index.html">Главная</a>
<a href="katalog.html">Каталог</a>
<a href="onas.html">О нас</a>
<a href="kab.html">Личный кабинет</a>
<a href="korzina.html">Корзина</a>
<a href="izbr.html">Избранное</a>
</nav>

</header>

<div class="container">

<h1 class="title">Бонусы</h1>

<div class="bonus-card">

<h2>Ваш бонусный баланс</h2>

<div class="bonus-value" id="bonusBalance">
0
</div>

<p>
За каждый оформленный заказ начисляется 500 бонусов.
</p>

</div>

</div>

<footer>

<div>Телефон: +7-900-015-15-15</div>
<div>Почта: krasovka@gmail.com</div>
<div>Адрес: г. Угинск ул. Тамары 23</div>

</footer>

<script>

function updateBonusBalance(){

    const bonuses = Number(
        localStorage.getItem('bonuses') || 0
    );

    document.getElementById(
        'bonusBalance'
    ).textContent = bonuses;
}

updateBonusBalance();

window.addEventListener(
    'storage',
    updateBonusBalance
);

</script>

</body>
</html>
