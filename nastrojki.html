<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Настройки</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" type="text/css" href="nastrojki.css">
</head>
<body>

<header>
<div class="logo-wrapper">
<div class="logo-circle"><a href="index.html"><img src="logo.png" alt="logo"></a></div>
<h1>НА ПОДЪЕМЕ</h1>
</div>
<nav>
<a href="index.html">Главная</a>
<a href="katalog.html">Каталог</a>
<a href="onas.html">О нас</a>
<a href="kab.html">Личный кабинет</a>
<a href="korzina.html" class="nav-cart-link">Корзина <span class="cart-badge">0</span></a>
</nav>
</header>

<div class="container">
<h1 class="title">Настройки</h1>

<div class="settings">
<div class="input-group">
<label>Имя и фамилия</label>
<div class="name-row">
<input type="text" id="firstName" placeholder="Имя" maxlength="30">
<input type="text" id="lastName" placeholder="Фамилия" maxlength="30">
</div>
</div>

<div class="input-group">
<label>День рождения</label>
<input type="text" id="birthday" placeholder="ГГГГ-ММ-ДД (необязательно)" maxlength="10" inputmode="numeric">
</div>

<div class="input-group">
<label>Email</label>
<input type="email" id="email" placeholder="Введите Email">
</div>

<div class="input-group">
<label>Пароль</label>
<div class="password-wrapper">
<input type="password" id="password" placeholder="Введите пароль" maxlength="50">
<button type="button" class="toggle-pass" onclick="togglePassword()">Показать</button>
</div>
</div>

<button onclick="saveSettings()">Сохранить</button>
</div>

<a href="kab.html" class="back-btn">← Назад</a>
</div>

<footer>
<div>Телефон: <a href="tel:+79000151515" class="contact-link">+7-900-015-15-15</a></div>
<div>Почта: <a href="mailto:krasovka@gmail.com" class="contact-link">krasovka@gmail.com</a></div>
<div class="footer-address">Адрес: г. Угинск ул. Тамары 23</div>
</footer>

<script>
window.addEventListener('load', function(){
  const user = JSON.parse(localStorage.getItem('user') || '{}');
  document.getElementById('firstName').value = user.firstName || '';
  document.getElementById('lastName').value = user.lastName || '';
  document.getElementById('birthday').value = user.birthday || '';
  document.getElementById('email').value = user.email || '';
  document.getElementById('password').value = user.password || '';
});

function togglePassword(){
  const input = document.getElementById('password');
  const btn = document.querySelector('.toggle-pass');
  if(input.type === 'password'){
    input.type = 'text';
    btn.textContent = 'Скрыть';
  } else {
    input.type = 'password';
    btn.textContent = 'Показать';
  }
  input.focus();
}

function isValidEmail(email){
  if(email === '') return true;  
  const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  return re.test(String(email).toLowerCase());
}

function saveSettings(){
  const firstName = document.getElementById('firstName').value.trim();
  const lastName = document.getElementById('lastName').value.trim();
  const birthday = document.getElementById('birthday').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  
  const emailInput = document.getElementById('email');
  
  document.querySelectorAll('.error-msg').forEach(el => el.remove());
  document.querySelectorAll('.error').forEach(el => el.classList.remove('error'));
  
  if(email !== ''){
    if(!isValidEmail(email)){
      showError(emailInput, 'Введите корректный email (пример: user@example.com)');
      return;
    }
  }
  
  if(password !== ''){
    if(password.length < 6){
      showError(document.getElementById('password'), 'Пароль должен содержать минимум 6 символов');
      return;
    }
  }
  
  if(birthday !== ''){
    const parts = birthday.split('-');
    if(parts.length !== 3 || parts[0].length !== 4){
      showError(bd, 'Неверный формат даты. Используйте ГГГГ-ММ-ДД');
      return;
    }
    const year = parts[0];
    if(isNaN(year) || year < 1900 || year > 2099){
      showError(bd, 'Год должен быть от 1900 до 2099');
      return;
    }
  }
  
  const user = { firstName, lastName, birthday, email, password };
  localStorage.setItem('user', JSON.stringify(user));
  
  showSuccess('Настройки сохранены!');
  
  if(window.opener && !window.opener.closed){
    try{
      if(typeof window.opener.loadUser === 'function') window.opener.loadUser();
      if(typeof window.opener.updateBonuses === 'function') window.opener.updateBonuses();
    }catch(e){}
  }
  
  setTimeout(function(){
    window.location.href = 'kab.html';
  }, 600);
}

function showError(input, message){
  input.classList.add('error');
  input.focus();
  
  const oldError = input.closest('.input-group').querySelector('.error-msg');
  if(oldError) oldError.remove();
  
  const errorDiv = document.createElement('div');
  errorDiv.className = 'error-msg';
  errorDiv.textContent = message;
  input.closest('.input-group').appendChild(errorDiv);
  
  input.addEventListener('input', function clearError(){
    input.classList.remove('error');
    const err = input.closest('.input-group').querySelector('.error-msg');
    if(err) err.remove();
    input.removeEventListener('input', clearError);
  }, {once: true});
}

function showSuccess(message){
  const btn = document.querySelector('.settings button');
  const originalText = btn.textContent;
  btn.textContent = message;
  btn.style.background = 'linear-gradient(135deg, #2dbb55, #3dd166)';
  setTimeout(function(){
    btn.textContent = originalText;
    btn.style.background = '';
  }, 2500);
}

function updateCartBadge() {
  const cart = JSON.parse(localStorage.getItem('cart') || '[]');
  const totalCount = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
  const badge = document.querySelector('.cart-badge');
  
  if (badge) {
    badge.textContent = totalCount;
    badge.classList.toggle('active', totalCount > 0);
  }
}

document.addEventListener('DOMContentLoaded', updateCartBadge);

window.addEventListener('storage', (e) => {
  if (e.key === 'cart' || !e.key) {
    updateCartBadge();
  }
});
</script>
</body>
</html>
