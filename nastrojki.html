<!-- НАСТРОЙКИ -->

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Настройки</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:#9d9d9d;
}

.container{
width:93%;
margin:40px auto;
}

.title{
font-size:58px;
font-weight:800;
margin-bottom:30px;
}

.settings{
background:#f5f5f5;
padding:40px;
border-radius:30px;
box-shadow:0 10px 24px rgba(0,0,0,0.12);
}

.input-group{
margin-bottom:28px;
}

label{
display:block;
font-size:20px;
margin-bottom:12px;
font-weight:600;
}

input{
width:100%;
height:58px;
border:none;
border-radius:16px;
padding:0 20px;
font-size:18px;
background:#e7e7e7;
}

button{
margin-top:20px;
width:240px;
height:58px;
border:none;
border-radius:18px;
background:linear-gradient(135deg,#111,#2c2c2c);
color:white;
font-size:17px;
font-weight:700;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h1 class="title">Настройки</h1>

<div class="settings">

<div class="input-group">
<label>Имя</label>
<input type="text" value="Артем">
</div>

<div class="input-group">
<label>Email</label>
<input type="email" value="artem@gmail.com">
</div>

<div class="input-group">
<label>Пароль</label>
<input type="password" value="123456">
</div>

<button>Сохранить изменения</button>

</div>

</div>

</body>
</html>
